[profile.default]
bytecode_hash = "none"
evm_version = "cancun"
ffi = true
fs_permissions = [{access = "read-write", path = ".forge-snapshots/"}]
libs = ["lib"]
out = "out"
optimizer = true
optimizer_runs = 200
solc_version = "0.8.30"
src = "src"
via_ir = false

[profile.ci]
fuzz = { runs = 512 }
invariant = { runs = 256, depth = 500 }

[lint]
exclude_lints = ["screaming-snake-case-immutable", "screaming-snake-case-const"]
lint_on_build = false
